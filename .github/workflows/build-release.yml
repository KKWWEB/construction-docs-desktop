name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: Windows EXE 빌드
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run build:win

      - name: 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./release-files/

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          name: "건설 통합결재 ${{ github.ref_name }}"
          body: |
            ## 🏗 건설 통합결재 ${{ github.ref_name }}

            ### 📥 설치 방법
            1. 아래 `건설통합결재-Setup-*.exe` 파일 다운로드
            2. 실행 후 설치 완료
            3. SmartScreen 경고 시 → "추가 정보" → "실행" 클릭
            4. 기존 www.joosan777.com 계정으로 로그인

            ### 💻 시스템 요구사항
            - Windows 10 / 11 (64비트)
            - 인터넷 연결 필요
          files: ./release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
